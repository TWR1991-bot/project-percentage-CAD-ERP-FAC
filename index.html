<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-size: 14px; }
        .table-header { background-color: #0d6efd; color: white; }
        .badge-done { background-color: #198754; color: white; }
        .badge-pending { background-color: #ffc107; color: black; }
        .project-card { border-left: 5px solid #0d6efd; }
    </style>
</head>
<body>
    <div class="container-fluid mt-3">
        <div class="card shadow">
            <div class="card-header table-header">
                <h5 class="mb-0">專案進度詳細掌控表</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover table-bordered">
                    <thead>
                        <tr>
                            <th>組裝編號</th>
                            <th>圖面名稱</th>
                            <th>數量</th>
                            <th>製作圖</th>
                            <th>製作進度</th>
                            <th>出貨狀態</th>
                        </tr>
                    </thead>
                    <tbody id="data-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzPtME1leyHa8qn3-8mwqy1SJZJqiEqvcUWRweZImF0zPz4qUJsREIqAKQZaXqZoHHI/exec';

        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('data-body');
                tbody.innerHTML = data.tasks.map(t => `
                    <tr>
                        <td>${t.組裝編號 || ''}</td>
                        <td>${t.圖面名稱 || ''}</td>
                        <td>${t.數量 || 0}</td>
                        <td>${t.製作圖完成 ? '<span class="badge badge-done">已完成</span>' : '<span class="badge badge-pending">待處理</span>'}</td>
                        <td>
                            <div class="progress" style="height: 15px;">
                                <div class="progress-bar" style="width: ${t.製作完工 ? '100%' : '50%'}"></div>
                            </div>
                        </td>
                        <td>${t.主體配件 ? '已出貨' : '未出貨'}</td>
                    </tr>
                `).join('');
            });
    </script>
</body>
</html>
