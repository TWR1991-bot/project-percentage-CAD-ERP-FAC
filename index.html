<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專案進度掌控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #fdfbf7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
        
        .bg-healing {
            background-color: #fdfbf7;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .circle-progress {
            transition: stroke-dasharray 1s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
        }

        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(0,0,0,0.1);
        }

        .sticky-header th {
            position: sticky;
            top: 0;
            z-index: 40 !important; /* 強制提高表頭層級，防止表身超過 */
            box-shadow: inset 0 -2px 0 #e2e8f0;
            background-clip: padding-box; /* 防止捲動時邊界漏色 */
        }

        .exporting-pdf {
            height: auto !important;
            overflow: visible !important;
            position: relative !important;
        }
        .exporting-pdf #table-container {
            overflow: visible !important;
            max-height: none !important;
        }

        /* 模板樹狀線條 */
        .tree-line {
            position: relative;
        }
        .tree-line::before {
            content: '';
            position: absolute;
            left: 0.75rem;
            top: 2rem;
            bottom: 0;
            width: 2px;
            background-color: #e2e8f0;
        }
    </style>
</head>
<body class="bg-healing h-screen flex overflow-hidden text-slate-700 font-sans selection:bg-indigo-100">

    <!-- 全域載入動畫 (連線 Google Sheets 用) -->
    <div id="global-loader" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-6 shadow-lg shadow-indigo-100"></div>
        <h2 class="text-2xl font-black text-indigo-700 tracking-wider animate-pulse">專案精靈喚醒中</h2>
        <p class="text-slate-500 font-bold mt-2">正在與 Google Sheets 資料庫連線...</p>
    </div>

    <!-- 左側導覽列 -->
    <nav class="w-64 bg-white flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-20 rounded-r-3xl border-r border-slate-100 shrink-0">
        <div class="p-8 flex items-center gap-3 border-b border-slate-100">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-400 to-purple-400 flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                <i class="fa-solid fa-layer-group text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-wider text-slate-800">專案掌控</h1>
        </div>
        <div class="flex-1 py-6 px-4 space-y-2">
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-left bg-indigo-50 text-indigo-600 font-bold transition-all">
                <i class="fa-solid fa-compass w-5 text-center text-lg"></i>
                <span>進行中專案</span>
            </button>
            <button onclick="switchTab('closed')" id="btn-closed" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-left hover:bg-slate-50 text-slate-500 font-medium transition-all">
                <i class="fa-solid fa-box-archive w-5 text-center text-lg"></i>
                <span>歷史典藏</span>
            </button>
            <button onclick="switchTab('settings')" id="btn-settings" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-left hover:bg-slate-50 text-slate-500 font-medium transition-all">
                <i class="fa-solid fa-wand-magic-sparkles w-5 text-center text-lg"></i>
                <span>模板與設定</span>
            </button>
        </div>
    </nav>

    <!-- 右側主內容區 -->
    <main class="flex-1 flex flex-col relative min-w-0">
        
        <!-- 視圖 1: 主視圖 -->
        <div id="view-main" class="flex-1 flex flex-col h-full w-full">
            <header class="h-20 flex items-center justify-between px-10 z-10 shrink-0 border-b border-slate-100/50">
                <h2 id="page-title" class="text-2xl font-black text-slate-800 tracking-tight">專案戰情室</h2>
            </header>
            <div class="flex-1 overflow-y-auto px-10 pb-10 pt-6" id="main-content">
                <!-- 內容動態生成 -->
            </div>
        </div>

        <!-- 視圖 2: 專案詳情與編輯 -->
        <div id="view-project-detail" class="hidden flex-1 flex flex-col h-full w-full bg-white z-30 absolute inset-0 rounded-l-3xl shadow-[-10px_0_30px_rgba(0,0,0,0.05)]">
            <header class="bg-gradient-to-r from-slate-50 to-white text-slate-800 p-6 flex justify-between items-center shrink-0 border-b border-slate-100">
                <div class="flex items-center gap-4">
                    <button onclick="backToMain()" class="w-10 h-10 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div>
                        <span id="detail-project-id" class="text-sm font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-lg mr-2"></span>
                        <h3 id="detail-project-name" class="text-2xl font-black inline-block tracking-tight">專案編輯</h3>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <button id="btn-export-pdf" onclick="exportToPDF()" class="hidden bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold py-2.5 px-5 rounded-xl transition-colors items-center gap-2 border border-rose-100">
                        <i class="fa-solid fa-file-pdf"></i> 匯出 PDF
                    </button>
                    <button id="btn-save-detail" onclick="saveProjectData()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-xl shadow-md shadow-indigo-200 transition-all hover:-translate-y-0.5 flex items-center gap-2">
                        <i class="fa-solid fa-check"></i> 儲存變更
                    </button>
                </div>
            </header>

            <div class="flex-1 flex flex-col overflow-hidden min-h-0">
                <div class="bg-white border-b border-slate-100 shrink-0 px-8 py-6">
                    <div class="flex gap-8 items-center justify-between">
                        <div class="flex gap-4">
                            <div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-4 min-w-[120px] text-center">
                                <div class="text-xs text-blue-500 font-bold mb-1">繪圖進度</div>
                                <div id="detail-prog-draw" class="text-2xl font-black text-blue-600">0%</div>
                            </div>
                            <div class="bg-orange-50/50 border border-orange-100 rounded-2xl p-4 min-w-[120px] text-center">
                                <div class="text-xs text-orange-500 font-bold mb-1">生產製造</div>
                                <div id="detail-prog-prod" class="text-2xl font-black text-orange-600">0%</div>
                            </div>
                            <div class="bg-emerald-50/50 border border-emerald-100 rounded-2xl p-4 min-w-[120px] text-center">
                                <div class="text-xs text-emerald-500 font-bold mb-1">出貨現場</div>
                                <div id="detail-prog-ship" class="text-2xl font-black text-emerald-600">0%</div>
                            </div>
                            <div class="flex items-center mx-2 text-slate-300"><i class="fa-solid fa-chevron-right"></i></div>
                            <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 min-w-[120px] text-center shadow-sm">
                                <div class="text-xs text-slate-500 font-bold mb-1">總體達成率</div>
                                <div id="detail-prog-total" class="text-2xl font-black text-slate-800">0%</div>
                            </div>
                        </div>

                        <div id="detail-weight-box" class="px-5 py-3 rounded-2xl bg-emerald-50 border border-emerald-200 flex items-center gap-4 transition-colors">
                            <div class="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl">
                                <i class="fa-solid fa-scale-balanced"></i>
                            </div>
                            <div>
                                <div class="text-xs text-slate-500 font-bold">權重健康度</div>
                                <div class="flex items-baseline gap-2">
                                    <span id="detail-weight-text" class="text-xl font-black text-emerald-600">100%</span>
                                    <span id="detail-weight-warning" class="hidden text-xs text-rose-500 font-bold animate-pulse">需調整為 100%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-8">
                        <button onclick="switchPhaseTab('drawing')" id="tab-drawing" class="px-6 py-2.5 font-bold text-blue-700 bg-blue-100 rounded-xl transition-all shadow-sm">
                            <i class="fa-solid fa-pen-nib mr-2"></i>繪圖進度
                        </button>
                        <button onclick="switchPhaseTab('production')" id="tab-production" class="px-6 py-2.5 font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-all">
                            <i class="fa-solid fa-hammer mr-2"></i>生產製造
                        </button>
                        <button onclick="switchPhaseTab('shipping')" id="tab-shipping" class="px-6 py-2.5 font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-all">
                            <i class="fa-solid fa-paper-plane mr-2"></i>出貨現場
                        </button>
                    </div>
                </div>

                <div class="flex-1 overflow-auto p-6 bg-slate-50" id="table-container"></div>
            </div>
        </div>
    </main>

    <!-- 模板工廠 Modal -->
    <div id="template-modal" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex justify-center items-center backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl h-[85vh] flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="template-modal-content">
            <header class="bg-gradient-to-r from-indigo-500 to-purple-600 p-6 flex justify-between items-center text-white shrink-0">
                <div>
                    <h3 class="text-2xl font-black tracking-tight"><i class="fa-solid fa-cube mr-2"></i>標準模板庫管理</h3>
                    <p class="text-indigo-100 text-sm mt-1">在這裡定義設備的層級架構與平行資訊，新增專案時即可一鍵帶入。</p>
                </div>
                <button onclick="closeTemplateModal()" class="w-10 h-10 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </header>
            
            <div class="p-4 bg-slate-50 border-b border-slate-200 shrink-0">
                <button onclick="addTemplateMajor()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl font-bold text-sm transition-colors shadow-sm">
                    <i class="fa-solid fa-plus mr-1"></i> 新增 大類
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-6 bg-slate-50/50" id="template-tree-container">
                <!-- 模板樹狀結構由 JS 生成 -->
            </div>
        </div>
    </div>

    <!-- 匯入設備 Modal -->
    <div id="append-template-modal" class="hidden fixed inset-0 bg-slate-900/60 z-[60] flex justify-center items-center backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl h-[80vh] flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="append-template-content">
            <header class="bg-gradient-to-r from-indigo-500 to-purple-600 p-6 flex justify-between items-center text-white shrink-0">
                <div>
                    <h3 class="text-2xl font-black tracking-tight"><i class="fa-solid fa-layer-group mr-2"></i>從模板匯入設備</h3>
                    <p class="text-indigo-100 text-sm mt-1">勾選需要追加的設備，系統將自動為您帶入所屬的大類與中類。</p>
                </div>
                <button onclick="closeAppendTemplateModal()" class="w-10 h-10 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </header>
            <div class="flex-1 overflow-y-auto p-6 bg-slate-50 shadow-inner" id="append-template-list">
                <!-- Checklist injected here -->
            </div>
            <div class="p-6 bg-white border-t border-slate-100 shrink-0">
                <button onclick="confirmAppendTemplate()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md shadow-indigo-200">
                    <i class="fa-solid fa-check mr-2"></i>確認匯入
                </button>
            </div>
        </div>
    </div>

    <script>
        // 定義檢核項目清單常數
        const CHECKLIST_TEMPLATES = {
            drawing: ['製作圖進度', 'ERP製程規劃', '本體BOM', '本體計畫生產', '組裝BOM', '組裝計畫生產'],
            production: ['製作開始', '製作完成', '組裝完成', '噴漆完成'],
            shipping: ['主體', '周邊(含欄杆)', '市購品']
        };

        const AREAS = ['A案', 'B案', 'C案', 'D案'];
        
        // 四大區域專屬主題配色定義
        const AREA_THEMES = {
            'A案': { dot: 'bg-indigo-400', badgeBg: 'bg-indigo-100', badgeText: 'text-indigo-700', tagBg: 'bg-indigo-50', tagText: 'text-indigo-500' },
            'B案': { dot: 'bg-emerald-400', badgeBg: 'bg-emerald-100', badgeText: 'text-emerald-700', tagBg: 'bg-emerald-50', tagText: 'text-emerald-500' },
            'C案': { dot: 'bg-amber-400', badgeBg: 'bg-amber-100', badgeText: 'text-amber-700', tagBg: 'bg-amber-50', tagText: 'text-amber-600' },
            'D案': { dot: 'bg-rose-400', badgeBg: 'bg-rose-100', badgeText: 'text-rose-700', tagBg: 'bg-rose-50', tagText: 'text-rose-500' }
        };

        // Google Apps Script API 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbyksZrGnmM62ilv7lOAho8UtHlG__Ggkzqf06p7rZ67NvyYlFu-mpmCbs8_GNJuMht22A/exec";

        // 系統資料
        let state = {
            currentTab: 'dashboard',
            editingProjectId: null,
            isEditMode: false,
            hasUnsavedChanges: false, 
            activePhaseTab: 'drawing', 
            tempEditData: null,
            selectedYear: null,
            templateMajors: [],
            projects: [],
            closedProjects: []
        };

        // --- 核心運算邏輯 (依照最新規則修改) ---
        function calculateProgress(projectData) {
            let drawWeighted = 0, prodWeighted = 0, shipWeighted = 0;
            let drawW = 0, prodW = 0, shipW = 0;
            let weightSum = 0;

            projectData.majors.forEach(major => {
                major.mediums.forEach(medium => {
                    let weight = parseFloat(medium.weight) || 0;
                    weightSum += weight;

                    let hasProd = medium.hasProduction !== false;
                    let hasShip = medium.hasShipping !== false;

                    let equipDraw = 0, equipProd = 0, equipShip = 0;
                    let equipCount = medium.equipments.length;

                    if (equipCount > 0) {
                        medium.equipments.forEach(eq => {
                            let detDraw = 0, detProd = 0, detShip = 0;
                            let detCount = eq.details.length;

                            if (detCount > 0) {
                                eq.details.forEach(det => {
                                    // 繪圖進度：僅看 [0] 製作圖進度
                                    detDraw += det.drawing[0] ? 100 : 0;
                                    
                                    // 生產製造：僅看 [1]製作完成, [2]組裝完成, [3]噴漆完成
                                    let pChecks = det.production.checks;
                                    let prodCheckedCount = (pChecks[1]?1:0) + (pChecks[2]?1:0) + (pChecks[3]?1:0);
                                    detProd += (prodCheckedCount / 3) * 100;
                                    
                                    // 出貨現場：主體, 周邊, 市購品 三者皆算
                                    detShip += (det.shipping.filter(Boolean).length / 3) * 100;
                                });
                                equipDraw += (detDraw / detCount);
                                equipProd += (detProd / detCount);
                                equipShip += (detShip / detCount);
                            }
                        });
                        
                        drawWeighted += (equipDraw / equipCount) * weight;
                        drawW += weight;
                        
                        if (hasProd) {
                            prodWeighted += (equipProd / equipCount) * weight;
                            prodW += weight;
                        }
                        if (hasShip) {
                            shipWeighted += (equipShip / equipCount) * weight;
                            shipW += weight;
                        }
                    }
                });
            });

            // 計算各大階段進度 (若該階段完全沒有被啟用，則為 0)
            let drawTotal = drawW > 0 ? (drawWeighted / drawW) : 0;
            let prodTotal = prodW > 0 ? (prodWeighted / prodW) : 0;
            let shipTotal = shipW > 0 ? (shipWeighted / shipW) : 0;

            // 計算總體達成率 (動態排除未啟用的階段)
            let activePhases = 1; // 繪圖永遠必備
            let totalSum = drawTotal;
            if (prodW > 0) { activePhases++; totalSum += prodTotal; }
            if (shipW > 0) { activePhases++; totalSum += shipTotal; }
            let total = totalSum / activePhases;
            
            return { 
                draw: Math.round(drawTotal), 
                prod: Math.round(prodTotal), 
                ship: Math.round(shipTotal), 
                total: Math.round(total), 
                weightSum: weightSum 
            };
        }

        // --- 主畫面導覽邏輯 ---
        function switchTab(tabId) {
            state.currentTab = tabId;
            document.getElementById('view-main').classList.remove('hidden');
            document.getElementById('view-project-detail').classList.add('hidden');

            ['dashboard', 'closed', 'settings'].forEach(id => {
                const btn = document.getElementById(`btn-${id}`);
                if (id === tabId) {
                    btn.classList.add('bg-indigo-50', 'text-indigo-600', 'font-bold');
                    btn.classList.remove('hover:bg-slate-50', 'text-slate-500', 'font-medium');
                } else {
                    btn.classList.remove('bg-indigo-50', 'text-indigo-600', 'font-bold');
                    btn.classList.add('hover:bg-slate-50', 'text-slate-500', 'font-medium');
                }
            });

            const title = document.getElementById('page-title');
            
            if (tabId === 'dashboard') {
                title.innerText = '專案戰情室';
                renderDashboard();
            } else if (tabId === 'closed') {
                title.innerText = '歷史典藏館';
                renderClosed();
            } else {
                title.innerText = '模板與設定中心';
                renderSettings();
            }
        }

        // --- 戰情室 ---
        function renderDashboard() {
            let html = '<div class="flex flex-col gap-8">';
            AREAS.forEach(area => {
                const areaProjects = state.projects.filter(p => p.area === area && p.status === 'active');
                let theme = AREA_THEMES[area] || AREA_THEMES['A案']; // 動態提取該廠區顏色
                
                html += `
                <div class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 overflow-hidden flex flex-col">
                    <div class="bg-slate-50 px-8 py-5 flex justify-between items-center border-b border-slate-100">
                        <span class="font-bold text-lg text-slate-700 flex items-center gap-2"><div class="w-2 h-6 ${theme.dot} rounded-full"></div> ${area}</span>
                        <span class="${theme.badgeBg} ${theme.badgeText} text-sm font-bold px-3 py-1 rounded-full">${areaProjects.length} 個專案</span>
                    </div>
                    <div class="p-6 bg-white grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6">
                `;

                if (areaProjects.length === 0) {
                    html += `<div class="col-span-full text-center text-slate-300 py-10"><i class="fa-solid fa-ghost text-4xl mb-3 block"></i>目前靜悄悄的</div>`;
                } else {
                    areaProjects.forEach(project => {
                        const prog = calculateProgress(project);
                        html += `
                        <div class="bg-white border border-slate-100 p-5 rounded-2xl shadow-sm hover-lift relative overflow-hidden group flex flex-col h-full">
                            <div class="flex justify-between items-start mb-4">
                                <div class="min-w-0 pr-2">
                                    <span class="text-sm font-bold ${theme.tagText} ${theme.tagBg} px-2 py-1 rounded-md">${project.id}</span>
                                    <h4 class="font-black text-lg text-slate-800 mt-2 tracking-tight truncate" title="${project.name}">${project.name}</h4>
                                </div>
                                <div class="relative w-14 h-14 flex items-center justify-center shrink-0">
                                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path class="text-slate-100" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        <path class="text-indigo-500 circle-progress drop-shadow-sm" stroke-dasharray="${prog.total}, 100" stroke-width="4" stroke="currentColor" fill="none" stroke-linecap="round" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                    </svg>
                                    <div class="absolute text-sm font-black text-slate-700">${prog.total}%</div>
                                </div>
                            </div>

                            <div class="space-y-3 mb-5 flex-1">
                                <div class="flex items-center gap-2">
                                    <span class="w-20 shrink-0 whitespace-nowrap text-sm text-slate-400 font-bold"><i class="fa-solid fa-pen-nib text-blue-400"></i> 繪圖進度</span>
                                    <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                        <div class="h-full bg-gradient-to-r from-blue-400 to-blue-500 rounded-full" style="width: ${prog.draw}%"></div>
                                    </div>
                                    <span class="w-10 text-right text-sm font-bold text-slate-600">${prog.draw}%</span>
                                </div>

        // --- 動態產生新專案邏輯 ---
        async function createNewProject() {
            const idVal = document.getElementById('new-proj-id').value.trim().toUpperCase();
            const nameVal = document.getElementById('new-proj-name').value.trim();
            const areaVal = document.getElementById('new-proj-area').value;

            if(!idVal || !nameVal || areaVal === '格式錯誤' || areaVal === '') {
                alert('請確實填寫正確的專案編號 (首碼A/B/C/D) 與專案名稱！');
                return;
            }
            if(state.projects.find(p => p.id === idVal) || state.closedProjects.find(p => p.id === idVal)) {
                alert('專案編號已存在於進行中或歷史資料庫中，請更換！');
                return;
            }

            const checkedCbs = document.querySelectorAll('.template-equip-cb:checked');
            if(checkedCbs.length === 0) {
                alert('請至少勾選一項設備模板！');
                return;
            }

            let treeStruct = {}; 
            checkedCbs.forEach(cb => {
                let [m, med, eq] = cb.value.split('-').map(Number);
                if(!treeStruct[m]) treeStruct[m] = {};
                if(!treeStruct[m][med]) treeStruct[m][med] = [];
                treeStruct[m][med].push(eq);
            });

            let newMajors = [];
            Object.keys(treeStruct).forEach(mStr => {
                let m = parseInt(mStr);
                let templateMaj = state.templateMajors[m];
                let newMaj = { name: templateMaj.name, mediums: [] };

                Object.keys(treeStruct[m]).forEach(medStr => {
                    let med = parseInt(medStr);
                    let templateMed = templateMaj.mediums[med];
                    let newMed = { 
                        name: templateMed.name, 
                        weight: templateMed.weight || 0, 
                        hasProduction: templateMed.hasProduction !== false,
                        hasShipping: templateMed.hasShipping !== false,
                        equipments: [] 
                    };

                    treeStruct[m][med].forEach(eqIdx => {
                        let templateEq = templateMed.equipments[eqIdx];
                        let newEq = { name: templateEq.name, details: [] };

                        templateEq.details.forEach(templateDet => {
                            newEq.details.push({
                                name: templateDet.name,
                                assemblyId: templateDet.assemblyId || '', 
                                bodyId: templateDet.bodyId || '', 
                                version: templateDet.version || '', 
                                qty: templateDet.qty || 1,
                                drawing: [false, false, false, false, false, false],
                                production: { checks: [false, false, false, false], inputs: { material: '', work: '' } },
                                shipping: [false, false, false]
                            });
                        });
                        newMed.equipments.push(newEq);
                    });
                    newMaj.mediums.push(newMed);
                });
                newMajors.push(newMaj);
            });

            const newProject = {
                id: idVal,
                name: nameVal,
                area: areaVal,
                status: 'active',
                majors: newMajors
            };

            const btn = document.querySelector('button[onclick="createNewProject()"]');
            const origHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 藍圖繪製並上傳至雲端中...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}?action=saveProject`, {
                    method: 'POST',
                    body: JSON.stringify(newProject)
                });
                const res = await response.json();
                if(res.status === 'success') {
                    state.projects.push(newProject);
                    alert(`成功！專案 [${idVal}] 已建立，並且自動套用了模板與寫入資料庫！`);
                    switchTab('dashboard');
                } else {
                    alert('資料庫寫入失敗：' + res.message);
                }
            } catch (error) {
                alert('網路連線異常，請稍後再試。');
            } finally {
                btn.innerHTML = origHtml;
                btn.disabled = false;
            }
        }

                } else {
                    state.templateMajors[m].mediums[med][field] = parseFloat(value) || 0;

                if (field === 'qty') {
                    state.templateMajors[m].mediums[med].equipments[eq].details[det][field] = parseInt(value) || 0;
                } else {
                    state.templateMajors[m].mediums[med].equipments[eq].details[det][field] = value;

            }

                                    <span class="text-xs text-slate-400">%</span>

                                    </label>

                                    </label>

                                    <button onclick="deleteTemplateNode('medium', ${mIdx}, ${medIdx})" class="text-xs text-slate-400 hover:text-rose-500 px-2 py-1 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                                </div>

                        </div>

                        <div class="space-y-3 pl-2">
                    `;

                    if(med.equipments.length === 0) html += `<div class="text-slate-400 text-xs italic">無設備資料</div>`;

                    med.equipments.forEach((eq, eqIdx) => {
                        html += `
                        <div class="bg-white border border-slate-100 rounded p-3 shadow-sm flex flex-col gap-2">
                            <div class="flex items-center justify-between">
                                <div class="font-bold text-slate-600 text-sm flex items-center gap-2">
                                    <span><i class="fa-solid fa-box text-slate-300 mr-1"></i> ${eq.name}</span>
                                    <button onclick="editTemplateNode('equip', ${mIdx}, ${medIdx}, ${eqIdx})" class="text-slate-300 hover:text-indigo-500 transition-colors" title="編輯名稱"><i class="fa-solid fa-pen text-xs"></i></button>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="addTemplateNode('detail', ${mIdx}, ${medIdx}, ${eqIdx})" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1 rounded font-bold transition-colors">+ 細項圖面</button>
                                    <button onclick="deleteTemplateNode('equip', ${mIdx}, ${medIdx}, ${eqIdx})" class="text-xs text-slate-400 hover:text-rose-500 px-2 py-1 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                            </div>
                            
                            <div class="flex flex-col gap-2 mt-2">

                        if(eq.details.length === 0) html += `<span class="text-slate-400 text-xs italic">未設定細項</span>`;

                        eq.details.forEach((det, detIdx) => {

                            let bId = det.bodyId || '';
                            let ver = det.version || '';
                            let qty = det.qty || 1;

                                        <div>
                                            <label class="block text-xs text-slate-400 mb-1 font-bold">版本</label>

                                        </div>
                                        <div>
                                            <label class="block text-xs text-slate-400 mb-1 font-bold">數量</label>
                                            <input type="number" min="0" value="${qty}" onchange="updateTemplateField('detail', ${mIdx}, ${medIdx}, ${eqIdx}, ${detIdx}, 'qty', this.value)" class="w-full text-xs px-2 py-1.5 border border-slate-200 rounded text-center focus:border-indigo-400 focus:outline-none">

                    });
                    html += `</div></div>`;
                });
                html += `</div></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // 新增/編輯/刪除 模板節點
        function addTemplateMajor() {
            let name = prompt('請輸入「大類」名稱：\n(如：機構設計、電控系統)');
            if(name && name.trim()) {
                state.templateMajors.push({ name: name.trim(), mediums: [] });
                renderTemplateTree();
                syncTemplatesToBackend();
            }
        }
        function addTemplateNode(type, m, med, eq) {
            let name;
            let hasChanged = false;
            if(type === 'medium') {
                name = prompt(`新增「中類」於 [${state.templateMajors[m].name}] 底下：`);
                if(name && name.trim()) { state.templateMajors[m].mediums.push({ name: name.trim(), weight: 0, equipments: [] }); hasChanged = true; }
            } else if(type === 'equip') {
                name = prompt(`新增「設備」於 [${state.templateMajors[m].mediums[med].name}] 底下：`);
                if(name && name.trim()) { state.templateMajors[m].mediums[med].equipments.push({ name: name.trim(), details: [] }); hasChanged = true; }
            } else if(type === 'detail') {
                name = prompt(`新增「細項圖面」於 [${state.templateMajors[m].mediums[med].equipments[eq].name}] 底下：`);
                if(name && name.trim()) { state.templateMajors[m].mediums[med].equipments[eq].details.push({ name: name.trim(), assemblyId: '', bodyId: '', version: '', qty: 1 }); hasChanged = true; }
            }
            if(hasChanged) {
                renderTemplateTree();
                syncTemplatesToBackend();
            }
        }

        function editTemplateNode(type, m, med, eq, det) {
            let oldName, newName;
            if(type === 'major') {
                oldName = state.templateMajors[m].name;
                newName = prompt('修改「大類」名稱：', oldName);
                if(newName && newName.trim()) state.templateMajors[m].name = newName.trim();
            } else if(type === 'medium') {
                oldName = state.templateMajors[m].mediums[med].name;
                newName = prompt('修改「中類」名稱：', oldName);
                if(newName && newName.trim()) state.templateMajors[m].mediums[med].name = newName.trim();
            } else if(type === 'equip') {
                oldName = state.templateMajors[m].mediums[med].equipments[eq].name;
                newName = prompt('修改「設備」名稱：', oldName);
                if(newName && newName.trim()) state.templateMajors[m].mediums[med].equipments[eq].name = newName.trim();
            } else if(type === 'detail') {
                oldName = state.templateMajors[m].mediums[med].equipments[eq].details[det].name;
                newName = prompt('修改「細項圖面」名稱：', oldName);
                if(newName && newName.trim()) state.templateMajors[m].mediums[med].equipments[eq].details[det].name = newName.trim();
            }
            
            if(newName && newName.trim() && newName !== oldName) {
                renderTemplateTree();
                syncTemplatesToBackend();
            }
        }

        function deleteTemplateNode(type, m, med, eq, det) {
            if(!confirm('確定要刪除此項目嗎？其底下所有的設定都會一併消失。')) return;
            if(type === 'major') state.templateMajors.splice(m, 1);
            else if(type === 'medium') state.templateMajors[m].mediums.splice(med, 1);
            else if(type === 'equip') state.templateMajors[m].mediums[med].equipments.splice(eq, 1);
            else if(type === 'detail') state.templateMajors[m].mediums[med].equipments[eq].details.splice(det, 1);
            
            renderTemplateTree();
            syncTemplatesToBackend();
        }

        // --- 專案詳情頁 (Excel 表格視圖) ---
        function openProjectDetail(projectId, isEditMode, sourceList) {
            let project;
            if(sourceList === 'active') {
                project = state.projects.find(p => p.id === projectId);
            } else {
                project = state.closedProjects.find(p => p.id === projectId);
            }
            if(!project) return;
            
            state.tempEditData = JSON.parse(JSON.stringify(project));
            state.editingProjectId = projectId;
            state.isEditMode = isEditMode;
            state.hasUnsavedChanges = false; 
            
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById('view-project-detail').classList.remove('hidden');

            document.getElementById('detail-project-id').innerText = project.id;
            
            document.getElementById('detail-project-name').innerHTML = `
                ${project.name} ${sourceList === 'closed' ? ' <span class="text-slate-400 text-lg font-bold">(已歸檔)</span>' : ''}
                ${isEditMode ? `<button onclick="editProjectName()" class="ml-2 text-slate-300 hover:text-indigo-600 transition-colors align-middle" title="修改專案名稱"><i class="fa-solid fa-pen text-lg"></i></button>` : ''}
            `;
            
            const saveBtn = document.getElementById('btn-save-detail');
            const pdfBtn = document.getElementById('btn-export-pdf');
            
            if(!isEditMode) {
                saveBtn.style.display = 'none';
                pdfBtn.style.display = 'flex';
            } else {
                saveBtn.style.display = 'flex';
                pdfBtn.style.display = 'none';
            }

            updateDetailProgress(); 
            switchPhaseTab(state.activePhaseTab); 
        }

        function backToMain() {
            if (state.isEditMode && state.hasUnsavedChanges) {
                if (confirm("⚠️ 您有尚未儲存的進度變更！\n\n按下「確定」直接幫您儲存至雲端，\n按下「取消」則放棄這些變更並離開。")) {
                    saveProjectData();
                    return; 
                }
            }

            state.tempEditData = null;
            state.editingProjectId = null;
            state.hasUnsavedChanges = false;
            document.getElementById('view-project-detail').classList.add('hidden');
            document.getElementById('view-main').classList.remove('hidden');
            if(state.currentTab === 'dashboard') {
                renderDashboard();
            } else if (state.currentTab === 'closed') {
                renderClosed(state.selectedYear);
            }
        }

        function switchPhaseTab(phase) {
            state.activePhaseTab = phase;
            const tabs = {
                drawing: { el: document.getElementById('tab-drawing'), color: 'blue' },
                production: { el: document.getElementById('tab-production'), color: 'orange' },
                shipping: { el: document.getElementById('tab-shipping'), color: 'emerald' }
            };

            for (const [key, tab] of Object.entries(tabs)) {
                if (key === phase) {
                    tab.el.className = `px-6 py-2.5 font-bold text-${tab.color}-700 bg-${tab.color}-100 rounded-xl transition-all shadow-sm`;
                } else {
                    tab.el.className = `px-6 py-2.5 font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-all`;
                }
            }
            renderPhaseTable(phase);
        }

        function editProjectName() {
            let newName = prompt("請輸入新的專案名稱：", state.tempEditData.name);
            if (newName && newName.trim() && newName.trim() !== state.tempEditData.name) {
                state.tempEditData.name = newName.trim();
                document.getElementById('detail-project-name').innerHTML = `
                    ${state.tempEditData.name}
                    <button onclick="editProjectName()" class="ml-2 text-slate-300 hover:text-indigo-600 transition-colors align-middle" title="修改專案名稱"><i class="fa-solid fa-pen text-lg"></i></button>
                `;
                markUnsaved();
            }
        }

        function getEquipRowspan(equip) {
            return Math.max(1, equip.details.length);
        }
        function getMediumRowspan(medium) {
            let count = 0;
            if(medium.equipments.length === 0) return 1;
            medium.equipments.forEach(eq => count += getEquipRowspan(eq));
            return count;
        }
        function getMajorRowspan(major) {
            let count = 0;
            if(major.mediums.length === 0) return 1;
            major.mediums.forEach(med => count += getMediumRowspan(med));
            return count;
        }

        function renderPhaseTable(phase) {
            const container = document.getElementById('table-container');
            let isEdit = state.isEditMode;
            
            let columnsHTML = '';
            let checklist = CHECKLIST_TEMPLATES[phase];
            let colorClass = phase === 'drawing' ? 'blue' : (phase === 'production' ? 'orange' : 'emerald');

            if (phase === 'drawing') {
                checklist.forEach(col => columnsHTML += `<th class="border-b-2 border-slate-200 px-3 py-4 text-center text-${colorClass}-700 font-bold bg-${colorClass}-50 min-w-[80px]">${col}</th>`);
            } else if (phase === 'production') {
                checklist.forEach(col => columnsHTML += `<th class="border-b-2 border-slate-200 px-3 py-4 text-center text-${colorClass}-700 font-bold bg-${colorClass}-50 min-w-[80px]">${col}</th>`);
                columnsHTML += `<th class="border-b-2 border-slate-200 px-3 py-4 text-center text-${colorClass}-700 font-bold bg-${colorClass}-50 min-w-[100px]">取料預估工</th>`;
                columnsHTML += `<th class="border-b-2 border-slate-200 px-3 py-4 text-center text-${colorClass}-700 font-bold bg-${colorClass}-50 min-w-[100px]">製作預估工</th>`;
            } else if (phase === 'shipping') {
                checklist.forEach(col => columnsHTML += `<th class="border-b-2 border-slate-200 px-3 py-4 text-center text-${colorClass}-700 font-bold bg-${colorClass}-50 min-w-[100px]">${col}</th>`);
                columnsHTML += `<th class="border-b-2 border-slate-200 px-3 py-4 text-center text-${colorClass}-700 font-bold bg-${colorClass}-50 min-w-[80px]">操作</th>`;
            }

            let html = '';
            if (isEdit) {
                html += `
                <div class="mb-4">
                    <button onclick="openAppendTemplateModal()" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-4 py-2 rounded-xl font-bold text-sm transition-colors shadow-sm">
                        <i class="fa-solid fa-layer-group mr-1"></i> 從模板匯入設備
                    </button>
                </div>
                `;
            }

            html += `
            <div class="bg-white shadow-sm border-b border-r border-slate-100 w-max min-w-full relative">
            <table class="w-full text-sm border-collapse" id="data-table">
                <thead class="sticky-header">
                    <tr>
                        <th class="border-b-2 border-slate-200 px-4 py-4 text-left w-32 bg-slate-50 font-bold text-slate-600">大類</th>
                        <th class="border-b-2 border-slate-200 px-4 py-4 text-left w-40 bg-slate-50 font-bold text-slate-600">中類 (權重%)</th>
                        <th class="border-b-2 border-slate-200 px-4 py-4 text-left w-40 bg-slate-50 font-bold text-slate-600">設備</th>
                        
                        <th class="border-b-2 border-slate-200 px-3 py-4 text-left w-24 bg-slate-50 font-bold text-slate-600 text-xs">組裝編號</th>
                        <th class="border-b-2 border-slate-200 px-3 py-4 text-left w-24 bg-slate-50 font-bold text-slate-600 text-xs">本體編號</th>
                        <th class="border-b-2 border-slate-200 px-3 py-4 text-center w-20 bg-slate-50 font-bold text-slate-600 text-xs">版本</th>
                        
                        <th class="border-b-2 border-slate-200 px-4 py-4 text-left w-56 bg-slate-50 font-bold text-slate-600">細項圖面</th>
                        <th class="border-b-2 border-slate-200 px-3 py-4 text-center w-16 bg-slate-50 font-bold text-slate-600 text-xs">數量</th>
                        
                        ${columnsHTML}
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
            `;

            state.tempEditData.majors.forEach((major, majIdx) => {
                let majRs = getMajorRowspan(major);
                let firstMaj = true;

                major.mediums.forEach((medium, medIdx) => {
                    let medRs = getMediumRowspan(medium);
                    let firstMed = true;
                    let medHasProd = medium.hasProduction !== false;
                    let medHasShip = medium.hasShipping !== false;

                    medium.equipments.forEach((equip, eqIdx) => {
                        let eqRs = getEquipRowspan(equip);
                        let firstEq = true;

                        if (equip.details.length === 0) {
                            html += renderTableRow(firstMaj, majRs, major.name, firstMed, medRs, medium.name, medium.weight, majIdx, medIdx, firstEq, eqRs, equip.name, eqIdx, null, null, null, phase, isEdit, medHasProd, medHasShip);
                            firstMaj = false; firstMed = false; firstEq = false;
                        } else {
                            equip.details.forEach((det, detIdx) => {
                                const pId = `${majIdx}-${medIdx}-${eqIdx}-${detIdx}`;
                                html += renderTableRow(firstMaj, majRs, major.name, firstMed, medRs, medium.name, medium.weight, majIdx, medIdx, firstEq, eqRs, equip.name, eqIdx, det, detIdx, pId, phase, isEdit, medHasProd, medHasShip);
                                firstMaj = false; firstMed = false; firstEq = false;
                            });
                        }
                    });
                });
            });

            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        function updatePhaseToggle(majIdx, medIdx, field, val) {
            state.tempEditData.majors[majIdx].mediums[medIdx][field] = val;
            markUnsaved();
            renderPhaseTable(state.activePhaseTab); 
        }

        function renderTableRow(firstMaj, majRs, majName, firstMed, medRs, medName, medWeight, majIdx, medIdx, firstEq, eqRs, eqName, eqIdx, det, detIdx, pId, phase, isEdit, medHasProd, medHasShip) {
            let rowHtml = `<tr class="hover:bg-slate-50/80 transition-colors">`;
            
            if (firstMaj) {
                rowHtml += `<td rowspan="${majRs}" class="border-r border-slate-100 px-4 py-3 align-top bg-white/50">
                                <div class="font-black text-slate-700">${majName}</div>
                                ${isEdit ? `
                                <div class="flex gap-2 mt-2">
                                    <button onclick="editProjectNode('major', ${majIdx})" title="編輯大類名稱" class="text-slate-400 hover:text-indigo-500 transition-colors"><i class="fa-solid fa-pen text-xs"></i></button>
                                    <button onclick="deleteProjectNode('major', ${majIdx})" title="刪除大類" class="text-slate-400 hover:text-rose-500 transition-colors"><i class="fa-solid fa-trash text-xs"></i></button>
                                </div>` : ''}
                            </td>`;
            }
            if (firstMed) {
                rowHtml += `<td rowspan="${medRs}" class="border-r border-slate-100 px-4 py-3 bg-white align-top">
                                <div class="font-bold text-slate-700 mb-2">${medName}</div>
                                <div class="flex items-center gap-1 bg-slate-50 rounded-lg px-2 py-1 w-max border border-slate-100 mb-2">
                                    <span class="text-[10px] text-slate-400 font-bold uppercase">Weight</span>
                                    <input type="number" min="0" max="100" value="${medWeight}" 
                                           oninput="updateWeight(${majIdx}, ${medIdx}, this.value)" 
                                           ${!isEdit ? 'disabled' : ''}
                                           class="w-10 text-center text-sm font-black text-indigo-600 bg-transparent focus:outline-none focus:bg-white rounded">
                                    <span class="text-xs text-slate-400">%</span>
                                </div>
                                <div class="flex flex-col gap-1.5 mb-2 bg-slate-50 p-2 rounded-lg border border-slate-100 w-max">
                                    <label class="flex items-center gap-1.5 text-xs font-bold ${medHasProd ? 'text-orange-600' : 'text-slate-400'} cursor-pointer">
                                        <input type="checkbox" ${medHasProd ? 'checked' : ''} ${!isEdit ? 'disabled' : ''} onchange="updatePhaseToggle(${majIdx}, ${medIdx}, 'hasProduction', this.checked)" class="w-3.5 h-3.5 text-orange-500 rounded border-slate-300 focus:ring-orange-500"> 需生產製造
                                    </label>
                                    <label class="flex items-center gap-1.5 text-xs font-bold ${medHasShip ? 'text-emerald-600' : 'text-slate-400'} cursor-pointer">
                                        <input type="checkbox" ${medHasShip ? 'checked' : ''} ${!isEdit ? 'disabled' : ''} onchange="updatePhaseToggle(${majIdx}, ${medIdx}, 'hasShipping', this.checked)" class="w-3.5 h-3.5 text-emerald-500 rounded border-slate-300 focus:ring-emerald-500"> 需出貨現場
                                    </label>
                                </div>
                                ${isEdit ? `
                                <div class="flex gap-2 mt-3">

        // 動態編輯已建專案的節點
        function openAppendTemplateModal() {
            document.getElementById('append-template-list').innerHTML = generateTemplateChecklistHtml('append-template');
            document.getElementById('append-template-modal').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('append-template-content').classList.remove('scale-95');
                document.getElementById('append-template-content').classList.add('scale-100');
            }, 10);
        }

        function closeAppendTemplateModal() {
            document.getElementById('append-template-content').classList.add('scale-95');
            document.getElementById('append-template-content').classList.remove('scale-100');
            setTimeout(() => {
                document.getElementById('append-template-modal').classList.add('hidden');
            }, 200);
        }

        function confirmAppendTemplate() {
            const checkedCbs = document.querySelectorAll('.append-template-cb:checked');
            if(checkedCbs.length === 0) {
                alert('請至少勾選一項設備！');
                return;
            }

            let treeStruct = {}; 
            checkedCbs.forEach(cb => {
                let [m, med, eq] = cb.value.split('-').map(Number);
                if(!treeStruct[m]) treeStruct[m] = {};
                if(!treeStruct[m][med]) treeStruct[m][med] = [];
                treeStruct[m][med].push(eq);
            });

            let addedMediums = 0;

            Object.keys(treeStruct).forEach(mStr => {
                let m = parseInt(mStr);
                let templateMaj = state.templateMajors[m];
                
                let targetMaj = state.tempEditData.majors.find(x => x.name === templateMaj.name);
                if (!targetMaj) {
                    targetMaj = { name: templateMaj.name, mediums: [] };
                    state.tempEditData.majors.push(targetMaj);
                }

                Object.keys(treeStruct[m]).forEach(medStr => {
                    let med = parseInt(medStr);
                    let templateMed = templateMaj.mediums[med];
                    
                    let targetMed = targetMaj.mediums.find(x => x.name === templateMed.name);
                    if (!targetMed) {
                        targetMed = { 
                            name: templateMed.name, 
                            weight: templateMed.weight || 0, 
                            hasProduction: templateMed.hasProduction !== false,
                            hasShipping: templateMed.hasShipping !== false,
                            equipments: [] 
                        };
                        targetMaj.mediums.push(targetMed);
                        addedMediums++;
                    }

                    treeStruct[m][med].forEach(eqIdx => {
                        let templateEq = templateMed.equipments[eqIdx];
                        let newEq = { name: templateEq.name, details: [] };

                        templateEq.details.forEach(templateDet => {
                            newEq.details.push({
                                name: templateDet.name,
                                assemblyId: templateDet.assemblyId || '', 
                                bodyId: templateDet.bodyId || '', 
                                version: templateDet.version || '', 
                                qty: templateDet.qty || 1,
                                drawing: [false, false, false, false, false, false],
                                production: { checks: [false, false, false, false], inputs: { material: '', work: '' } },
                                shipping: [false, false, false]
                            });
                        });
                        targetMed.equipments.push(newEq);
                    });
                });
            });

            closeAppendTemplateModal();
            renderPhaseTable(state.activePhaseTab);
            markUnsaved();
            
            if (addedMediums > 0) {
                alert('已匯入新項目！\n請注意檢查並調整「中類預設權重」，以確保總合為 100%。');
            }
        }

        function addProjectNode(type, m, med, eq) {
            let name;
            let hasChanged = false;
            if(type === 'detail') {
                name = prompt(`新增「細項圖面」於 [${state.tempEditData.majors[m].mediums[med].equipments[eq].name}] 底下：`);
                if(name && name.trim()) { 
                    state.tempEditData.majors[m].mediums[med].equipments[eq].details.push({ 
                        name: name.trim(), assemblyId: '', bodyId: '', version: '', qty: 1,
                        drawing: [false, false, false, false, false, false],
                        production: { checks: [false, false, false, false], inputs: { material: '', work: '' } },
                        shipping: [false, false, false]
                    }); 
                    hasChanged = true; 
                }
            } else if(type === 'equip') {
                name = prompt(`新增「設備」於 [${state.tempEditData.majors[m].mediums[med].name}] 底下：`);
                if(name && name.trim()) { state.tempEditData.majors[m].mediums[med].equipments.push({ name: name.trim(), details: [] }); hasChanged = true; }
            } else if(type === 'medium') {
                name = prompt(`新增「中類」於 [${state.tempEditData.majors[m].name}] 底下：`);
                if(name && name.trim()) { state.tempEditData.majors[m].mediums.push({ name: name.trim(), weight: 0, hasProduction: true, hasShipping: true, equipments: [] }); hasChanged = true; }
            } else if(type === 'major') {
                name = prompt('請輸入「大類」名稱：');
                if(name && name.trim()) { state.tempEditData.majors.push({ name: name.trim(), mediums: [] }); hasChanged = true; }
            }

            if(hasChanged) {
                renderPhaseTable(state.activePhaseTab);
                markUnsaved(); 
            }
        }

        function editProjectNode(type, m, med, eq) {
            let oldName, newName;
            if(type === 'major') {
                oldName = state.tempEditData.majors[m].name;
                newName = prompt('修改「大類」名稱：', oldName);
                if(newName && newName.trim()) state.tempEditData.majors[m].name = newName.trim();
            } else if(type === 'medium') {
                oldName = state.tempEditData.majors[m].mediums[med].name;
                newName = prompt('修改「中類」名稱：', oldName);
                if(newName && newName.trim()) state.tempEditData.majors[m].mediums[med].name = newName.trim();
            } else if(type === 'equip') {
                oldName = state.tempEditData.majors[m].mediums[med].equipments[eq].name;
                newName = prompt('修改「設備」名稱：', oldName);
                if(newName && newName.trim()) state.tempEditData.majors[m].mediums[med].equipments[eq].name = newName.trim();
            }
            
            if(newName && newName.trim() && newName !== oldName) {
                renderPhaseTable(state.activePhaseTab);
                markUnsaved(); 
            }
        }

        function deleteProjectNode(type, m, med, eq, det) {
            if(!confirm('確定要刪除此項目嗎？其底下的所有設定與進度都會一併移除！')) return;
            
            if(type === 'major') state.tempEditData.majors.splice(m, 1);
            else if(type === 'medium') state.tempEditData.majors[m].mediums.splice(med, 1);
            else if(type === 'equip') state.tempEditData.majors[m].mediums[med].equipments.splice(eq, 1);
            else if(type === 'detail') state.tempEditData.majors[m].mediums[med].equipments[eq].details.splice(det, 1);
            
            renderPhaseTable(state.activePhaseTab);
            markUnsaved(); 
        }

        function getDetailObj(pId) {
            const [maj, med, eq, det] = pId.split('-').map(Number);
            return state.tempEditData.majors[maj].mediums[med].equipments[eq].details[det];
        }

        function markUnsaved() {
            if (!state.isEditMode) return;
            state.hasUnsavedChanges = true;
            updateDetailProgress();
        }
        
        function updateDetailField(pId, field, val) {
            const detail = getDetailObj(pId);
            detail[field] = val;
            markUnsaved();
        }

        function toggleCheck(pId, phase, idx, isChecked) {
            const detail = getDetailObj(pId);
            if (phase === 'draw') detail.drawing[idx] = isChecked;
            if (phase === 'prod') detail.production.checks[idx] = isChecked;
            if (phase === 'ship') detail.shipping[idx] = isChecked;
            markUnsaved();
        }

        function selectAllShipping(pId) {
            const detail = getDetailObj(pId);
            detail.shipping = [true, true, true];
            markUnsaved();
            renderPhaseTable('shipping'); 
        }

        function updateInput(pId, type, val) {
            const detail = getDetailObj(pId);
            detail.production.inputs[type] = val;
            markUnsaved();
        }

        function updateWeight(majIdx, medIdx, val) {
            state.tempEditData.majors[majIdx].mediums[medIdx].weight = parseFloat(val) || 0;
            markUnsaved();
        }

        function updateDetailProgress() {
            const prog = calculateProgress(state.tempEditData);
            
            document.getElementById('detail-prog-draw').innerText = prog.draw + '%';
            document.getElementById('detail-prog-prod').innerText = prog.prod + '%';
            document.getElementById('detail-prog-ship').innerText = prog.ship + '%';
            document.getElementById('detail-prog-total').innerText = prog.total + '%';

            const weightBox = document.getElementById('detail-weight-box');
            const weightText = document.getElementById('detail-weight-text');
            const warning = document.getElementById('detail-weight-warning');
            const saveBtn = document.getElementById('btn-save-detail');

            weightText.innerText = prog.weightSum + '%';

            if (prog.weightSum !== 100) {
                weightBox.classList.replace('bg-emerald-50', 'bg-rose-50');
                weightBox.classList.replace('border-emerald-200', 'border-rose-200');
                weightText.classList.replace('text-emerald-600', 'text-rose-600');
                weightBox.querySelector('.w-10').classList.replace('bg-emerald-100', 'bg-rose-100');
                weightBox.querySelector('.w-10').classList.replace('text-emerald-600', 'text-rose-600');
                warning.classList.remove('hidden');
                
                if(state.isEditMode) {
                    saveBtn.disabled = true;
                    saveBtn.classList.replace('bg-indigo-600', 'bg-slate-300');
                    saveBtn.classList.replace('bg-amber-500', 'bg-slate-300');
                    saveBtn.classList.replace('hover:bg-indigo-700', 'hover:bg-slate-300');
                    saveBtn.classList.replace('hover:bg-amber-600', 'hover:bg-slate-300');
                    saveBtn.classList.remove('shadow-md', 'shadow-indigo-200', 'hover:-translate-y-0.5', 'ring-4', 'ring-amber-200');
                    saveBtn.classList.add('cursor-not-allowed');
                    saveBtn.innerHTML = '<i class="fa-solid fa-lock"></i> 權重錯誤';
                }
            } else {
                weightBox.classList.replace('bg-rose-50', 'bg-emerald-50');
                weightBox.classList.replace('border-rose-200', 'border-emerald-200');
                weightText.classList.replace('text-rose-600', 'text-emerald-600');
                weightBox.querySelector('.w-10').classList.replace('bg-rose-100', 'bg-emerald-100');
                weightBox.querySelector('.w-10').classList.replace('text-rose-600', 'text-emerald-600');
                warning.classList.add('hidden');

                if(state.isEditMode) {
                    saveBtn.disabled = false;
                    saveBtn.classList.remove('bg-slate-300', 'hover:bg-slate-300', 'cursor-not-allowed');
                    saveBtn.classList.add('shadow-md', 'shadow-indigo-200', 'hover:-translate-y-0.5');
                    
                    if (state.hasUnsavedChanges) {
                        saveBtn.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> 尚未儲存 (請點擊)';
                        saveBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
                        saveBtn.classList.add('bg-amber-500', 'hover:bg-amber-600', 'ring-4', 'ring-amber-200');
                    } else {
                        saveBtn.innerHTML = '<i class="fa-solid fa-check"></i> 儲存變更';
                        saveBtn.classList.remove('bg-amber-500', 'hover:bg-amber-600', 'ring-4', 'ring-amber-200');
                        saveBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
                    }
                }
            }
        }

        async function saveProjectData() {
            const index = state.projects.findIndex(p => p.id === state.editingProjectId);
            if(index !== -1) {
                state.projects[index] = JSON.parse(JSON.stringify(state.tempEditData));
                const projectObj = state.projects[index];
                
                const saveBtn = document.getElementById('btn-save-detail');
                const origHtml = saveBtn.innerHTML;
                saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存至雲端...';
                saveBtn.disabled = true;

                try {
                    const response = await fetch(`${API_URL}?action=saveProject`, {
                        method: 'POST',
                        body: JSON.stringify(projectObj)
                    });
                    const res = await response.json();
                    
                    if(res.status === 'success') {
                        state.hasUnsavedChanges = false; 
                        alert('專案進度已成功同步至 Google Sheets！');
                        backToMain();
                    } else {
                        alert('儲存失敗：' + res.message);
                    }
                } catch (error) {
                    alert('網路連線異常，請稍後再試。');
                } finally {
                    if (state.hasUnsavedChanges) {
                        saveBtn.innerHTML = origHtml;
                        saveBtn.disabled = false;
                    }
                }
            }
        }

        async function closeProject(id) {
            if(confirm(`確定要把專案 [${id}] 結案並封存至歷史典藏館嗎？`)) {
                const index = state.projects.findIndex(p => p.id === id);
                if(index > -1) {
                    let proj = state.projects[index];
                    const origStatus = proj.status;
                    
                    proj.status = 'closed';
                    proj.closeDate = new Date().toISOString().split('T')[0];
                    proj.progress = calculateProgress(proj);
                    
                    try {
                        const response = await fetch(`${API_URL}?action=saveProject`, {
                            method: 'POST',
                            body: JSON.stringify(proj)
                        });
                        const res = await response.json();
                        
                        if(res.status === 'success') {
                            state.closedProjects.push(proj);
                            state.projects.splice(index, 1);
                            renderDashboard();
                            alert('專案已順利結案並封存。');
                        } else {
                            proj.status = origStatus; 
                            alert('結案失敗：' + res.message);
                        }
                    } catch (error) {
                        proj.status = origStatus; 
                        alert('網路連線異常，請稍後再試。');
                    }
                }
            }
        }

        async function deleteProject(id) {
            const pwd = prompt(`警告：您即將永久刪除專案 [${id}]。\n請輸入管理員密碼 (將核對 Google Sheets 設定) 以確認刪除：`);
            if (pwd === null) return;

            try {
                const isValid = await verifyPasswordFromBackend(pwd);
                if (isValid) {
                    const response = await fetch(`${API_URL}?action=deleteProject&id=${encodeURIComponent(id)}`);
                    const res = await response.json();
                    
                    if(res.status === 'success') {
                        const index = state.projects.findIndex(p => p.id === id);
                        if(index > -1) {
                            state.projects.splice(index, 1);
                            renderDashboard();
                            alert(`專案 [${id}] 已成功從資料庫中永久刪除。`);
                        }
                    } else {
                        alert('刪除失敗：' + res.message);
                    }
                } else {
                    alert('密碼錯誤，刪除失敗！');
                }
            } catch(e) {
                alert('網路連線異常，請檢查。');
            }
        }

        async function verifyPasswordFromBackend(password) {
            if (!password || password.trim() === "") return false;
            try {
                const response = await fetch(`${API_URL}?action=verifyPassword&password=${encodeURIComponent(password)}`);
                const res = await response.json();
                return res.status === 'success' && res.data.isValid === true;
            } catch(e) {
                console.error("Password verification error:", e);
                return false;
            }
        }

        function exportToPDF() {
            const btn = document.getElementById('btn-export-pdf');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 報表產生中...';
            
            const detailView = document.getElementById('view-project-detail');
            detailView.classList.add('exporting-pdf');
            
            setTimeout(() => {
                const opt = {
                    margin:       0.3,
                    filename:     `專案報表_${state.editingProjectId}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    jsPDF:        { unit: 'in', format: 'a3', orientation: 'landscape' },
                    html2canvas:  { 
                        scale: 1.5, 
                        useCORS: true,
                        windowWidth: detailView.scrollWidth,
                        windowHeight: detailView.scrollHeight
                    }
                };

                html2pdf().set(opt).from(detailView).save().then(() => {
                    btn.innerHTML = originalText;
                    detailView.classList.remove('exporting-pdf');
                });
            }, 300);
        }

        async function fetchInitialData() {
            try {
                const response = await fetch(`${API_URL}?action=getInitialData`);
                const result = await response.json();
                
                if(result.status === 'success') {
                    state.projects = result.data.projects || [];
                    state.closedProjects = result.data.closedProjects || [];
                    state.templateMajors = result.data.templateMajors || [];
                    
                    const loader = document.getElementById('global-loader');
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.classList.add('hidden'), 500);

                    switchTab('dashboard'); 
                } else {
                    alert("載入資料庫失敗，請確認 API 網址是否正確。錯誤：" + result.message);
                }
            } catch(e) {
                alert("網路錯誤，無法連線至 Google Sheets：" + e.message);
            }
        }

        window.onload = () => {
            fetchInitialData();
        };

    </script>
</body>
</html>
